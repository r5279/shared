# =============================================================================
# tmux 설정 파일: ~/.tmux.conf
#
# 이 파일은 tmux가 시작될 때 자동으로 로드하는 사용자 설정 파일이다.
# (시스템 전역 설정은 보통 /etc/tmux.conf 에 존재할 수 있음)
#
# ---------------------------------------------------------------------------
# 1) 마우스 사용 (mouse on)
# ---------------------------------------------------------------------------
# - tmux 안에서 마우스 휠로 스크롤(=copy mode 진입/이동)이 가능해진다.
# - 마우스로 pane 선택/크기조절(드래그) 같은 기본 조작도 가능해진다.
#
# 참고: mouse를 켜지 않아도 스크롤은 가능하지만, 기본 방식은 "copy-mode"다.
#   - copy-mode 진입:  Ctrl+b  [
#   - copy-mode 종료:  q
#
# ---------------------------------------------------------------------------
# 2) 히스토리(스크롤백) 버퍼 증가 (history-limit)
# ---------------------------------------------------------------------------
# - tmux는 각 pane의 출력 내용을 내부 버퍼에 일정 줄 수만큼 저장한다.
# - 기본값은 비교적 작아서(환경에 따라 다르지만 대략 수천 줄 수준) 로그를 많이 찍으면
#   이전 내용이 금방 사라질 수 있다.
# - 아래 설정은 최대 100000줄까지 유지하도록 늘린다.
#
# ---------------------------------------------------------------------------
# 3) "윈도우(window)" 이동 단축키를 Shift+Left / Shift+Right 로 변경
# ---------------------------------------------------------------------------
# tmux 구조:
#   session -> window(탭) -> pane(분할 화면)
#
# 여기서 "window 이동"은 같은 session 안에서 탭(윈도우)을 이전/다음으로 이동하는 것.
#
# 원래(기본) window 이동 키:
#   - 다음 window:      Ctrl+b  n
#   - 이전 window:      Ctrl+b  p
#   - window 목록:      Ctrl+b  w
#   - 숫자로 이동:      Ctrl+b  0..9  (해당 번호 window로 점프)
#
# 요청한 변경:
#   - 이전 window:      Shift + ←
#   - 다음 window:      Shift + →
#
# 구현 방식:
# - 'bind -n' 은 prefix(Ctrl+b) 없이 바로 동작하는 키 바인딩이다.
# - "S-Left", "S-Right" 표기는 Shift+화살표를 의미한다.
#
# 주의:
# - 일부 터미널/OS 조합에서는 Shift+화살표가 다른 기능(선택/단어이동 등)으로
#   이미 사용되거나 tmux로 전달되지 않을 수 있다.
#   그런 경우에는 Alt+Left/Right 또는 Ctrl+Shift+Left/Right 같은 대안을 쓰는 편이 안전하다.
# =============================================================================

# 마우스 사용
set -g mouse on

# 스크롤백 히스토리 증가
set -g history-limit 100000

# window 이동을 Shift+Left / Shift+Right 로
bind -n S-Left  previous-window
bind -n S-Right next-window
